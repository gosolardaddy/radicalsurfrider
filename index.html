const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const GW = 360;
const GH = 640;

function resize() {
  const vw = (window.visualViewport ? window.visualViewport.width  : window.innerWidth);
  const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
  const scale = Math.min(vw / GW, vh / GH);
  canvas.width = GW;
  canvas.height = GH;
  canvas.style.width  = GW * scale + 'px';
  canvas.style.height = GH * scale + 'px';
}
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
resize();
window.addEventListener('resize', resize);

// ---- LEADERBOARD (Firebase Realtime Database) ----
const DB_URL = 'https://radical-surfrider-default-rtdb.firebaseio.com/leaderboard.json';
let lbCache = [];

function fetchLB() {
  return fetch(DB_URL).then(r => r.json()).then(data => {
    lbCache = Array.isArray(data) ? data : [];
  }).catch(() => {});
}
function saveLB(lb) {
  lbCache = lb;
  fetch(DB_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(lb) }).catch(() => {});
}
function qualifies(s) { return lbCache.length < 5 || s > (lbCache[lbCache.length - 1]?.score || 0); }
function addScore(name, s) {
  const lb = [...lbCache];
  lb.push({ name: name.toUpperCase().substring(0, 12), score: Math.floor(s) });
  lb.sort((a,b) => b.score - a.score);
  if (lb.length > 5) lb.length = 5;
  saveLB(lb);
}
fetchLB(); // load on page start

let masterGain = null;

// All sfx as <audio> elements — unlocked on first user tap for iOS
const SFX = {
  woah:    { src: 'woah.mp3',    vol: 1.0  }, // fallback only
  crash:   { src: 'crash.mp3',   vol: 1.0  },
  cheer:   { src: 'cheer.mp3',   vol: 0.18 },
  levelup: { src: 'levelup.mp3', vol: 0.18 },
  seagull: { src: 'seagull.mp3', vol: 1.0  },
};
// Pre-create elements
Object.entries(SFX).forEach(([key, cfg]) => {
  const el = document.createElement('audio');
  el.src = cfg.src;
  el.preload = 'auto';
  el.volume = cfg.vol;
  cfg.el = el;
});

function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  // Play+pause every element during user gesture to unlock iOS
  Object.values(SFX).forEach(cfg => {
    cfg.el.play().then(() => { cfg.el.pause(); cfg.el.currentTime = 0; }).catch(() => {});
  });
}

function playSfx(key) {
  const cfg = SFX[key];
  if (!cfg) return;
  cfg.el.currentTime = 0;
  cfg.el.play().catch(() => {});
}

let woahBuffer = null;
function initAudio() {
  if (audioCtx) return;
  unlockAudio();
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.6;
    masterGain.connect(audioCtx.destination);
    audioCtx.resume();
    // Paddle — looping filtered noise, gain controlled per frame
    const bufSize = audioCtx.sampleRate * 3;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const bd = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) bd[i] = Math.random() * 2 - 1;
    const pSrc = audioCtx.createBufferSource();
    pSrc.buffer = buf; pSrc.loop = true;
    const pFilt = audioCtx.createBiquadFilter();
    pFilt.type = 'bandpass'; pFilt.frequency.value = 280; pFilt.Q.value = 1;
    paddleGainNode = audioCtx.createGain();
    paddleGainNode.gain.value = 0;
    pSrc.connect(pFilt); pFilt.connect(paddleGainNode); paddleGainNode.connect(masterGain);
    pSrc.start();
    // Load woah via Web Audio for low latency + amplification
    audioCtx.resume().then(() => {
      fetch('woah.mp3').then(r => r.arrayBuffer()).then(b => audioCtx.decodeAudioData(b)).then(d => { woahBuffer = d; }).catch(() => {});
    });
  } catch(e) {}
}

function note(freq, t, dur, vol, type='square') {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.9);
  osc.connect(g); g.connect(masterGain);
  osc.start(t); osc.stop(t + dur);
}

function sfxWipeout()    { playSfx('crash'); }
function sfxCheer()      { playSfx('cheer'); }
function sfxLevelUp()    { playSfx('levelup'); }
function sfxWoahh() {
  if (audioCtx && woahBuffer) {
    // Web Audio — zero latency, can amplify above 1.0
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    src.buffer = woahBuffer;
    g.gain.value = 2.5;
    src.connect(g); g.connect(masterGain);
    src.start();
  } else {
    playSfx('woah'); // fallback audio element
  }
}
function sfxSharkPulse() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  note(55, t,      0.22, 0.38, 'sine');
  note(70, t+0.24, 0.16, 0.28, 'sine');
}

let seagullInterval = null;
function startBGM() {
  const bgm = document.getElementById('bgmAudio');
  if (!bgm || bgmPlaying) return;
  bgmPlaying = true;
  bgm.volume = 0.35;
  bgm.currentTime = 0;
  bgm.play().catch(() => {});
  // Seagulls once per minute
  if (seagullInterval) clearInterval(seagullInterval);
  seagullInterval = setInterval(() => {
    if (state !== 'playing') return;
    playSfx('seagull');
  }, 10000);
}
function stopBGM() {
  const bgm = document.getElementById('bgmAudio');
  bgmPlaying = false;
  if (bgm) { bgm.pause(); bgm.currentTime = 0; }
  if (bgmTimeout) { clearTimeout(bgmTimeout); bgmTimeout = null; }
  if (seagullInterval) { clearInterval(seagullInterval); seagullInterval = null; }
}

// ---- INPUT ----
let touchX = null;
let touching = false;

function getTouchX(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = GW / rect.width;
  return (e.touches[0].clientX - rect.left) * scaleX;
}
function getClickX(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = GW / rect.width;
  return (e.clientX - rect.left) * scaleX;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touching = true;
  touchX = getTouchX(e);
  handleInput();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  touchX = getTouchX(e);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touching = false;
  touchX = null;
}, { passive: false });
canvas.addEventListener('click', e => {
  touchX = getClickX(e);
  touching = true;
  handleInput();
  setTimeout(() => { touching = false; touchX = null; }, 100);
});
canvas.addEventListener('mousemove', e => {
  if (!touching) return;
  const rect = canvas.getBoundingClientRect();
  touchX = (e.clientX - rect.left) * (GW / rect.width);
});
canvas.addEventListener('mousedown', e => {
  touching = true;
  const rect = canvas.getBoundingClientRect();
  touchX = (e.clientX - rect.left) * (GW / rect.width);
  handleInput();
});
canvas.addEventListener('mouseup', () => { touching = false; touchX = null; });

// ---- DRAW HELPERS ----

function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function drawSurfer(x, y, scared) {
  const cx = Math.floor(x);
  const cy = Math.floor(y);

  // ---- SURFBOARD (angled toward top-right) ----
  ctx.save();
  ctx.translate(cx + 6, cy + 20);
  ctx.rotate(-0.40); // ~-23 deg, nose points upper-right

  // shadow
  ctx.globalAlpha = 0.22;
  ctx.fillStyle = '#000';
  ctx.fillRect(-28, 2, 60, 6);
  ctx.globalAlpha = 1;

  // board body
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(-28, -5, 56, 10);

  // pointed nose (right = upper-right after rotation)
  ctx.fillStyle = '#eeeeee';
  ctx.beginPath();
  ctx.moveTo(28,  -5);
  ctx.lineTo(40,   0);
  ctx.lineTo(28,   5);
  ctx.closePath();
  ctx.fill();

  // rounded tail (left = lower-left after rotation)
  ctx.fillStyle = '#dddddd';
  ctx.fillRect(-34, -3, 8, 6);
  ctx.fillRect(-32, -4, 6, 1); // taper
  ctx.fillRect(-32,  3, 6, 1);

  // red stripe down the middle
  ctx.fillStyle = '#ee0000';
  ctx.fillRect(-26, -2, 52, 4);

  // skull sticker
  ctx.fillStyle = '#222222';
  ctx.fillRect(8,  -4, 6, 5);   // skull head
  ctx.fillRect(6,  -2, 2, 3);   // left eye socket
  ctx.fillRect(12, -2, 2, 3);   // right eye socket
  ctx.fillRect(7,   1, 6, 2);   // teeth
  ctx.fillRect(8,   0, 1, 1);   // gap
  ctx.fillRect(10,  0, 1, 1);
  ctx.fillRect(12,  0, 1, 1);


  ctx.restore();
  // ---- END BOARD ----

  // legs (crouched surf stance)

function drawShark(o) {
  // 8-bit pixel shark matching reference: stepped staircase head, tall center dorsal fin,
  // two separate pectoral squares, forked crescent tail. Tail=left, head=right.
  const x = Math.floor(o.x), y = Math.floor(o.y);

  const D = '#1a55aa';   // dark blue (outline)
  const B = '#2299cc';   // body blue
  const L = '#44bbdd';   // light blue (belly / highlight)

  // === TAIL — two forked lobes ===
  // upper lobe
  px(x,      y + 6,  5, 6, D);
  px(x + 1,  y + 6,  6, 5, B);
  px(x + 2,  y + 7,  3, 3, L);
  // lower lobe
  px(x,      y + 20, 5, 6, D);
  px(x + 1,  y + 21, 6, 5, B);
  px(x + 2,  y + 22, 3, 3, L);
  // peduncle
  px(x + 7,  y + 12, 5, 8, D);
  px(x + 8,  y + 13, 4, 6, B);

  // === BODY ===
  px(x + 12, y + 10, 32, 13, B);   // main body
  px(x + 14, y + 10, 24,  2, L);   // top edge highlight
  px(x + 14, y + 19, 22,  4, L);   // belly highlight
  px(x + 12, y + 22, 32,  2, D);   // bottom edge

  // === DORSAL FIN — tall, narrow at tip ===
  px(x + 24, y,      4,  2, D);    // tip (dark outline)
  px(x + 24, y + 2,  4,  4, B);    // upper fin
  px(x + 22, y + 4,  6,  4, B);    // mid fin
  px(x + 20, y + 7,  8,  4, B);    // base (merges into body top)
  px(x + 28, y + 2,  4,  6, D);    // right edge shadow
  px(x + 25, y + 3,  2,  2, L);    // highlight

  // === PECTORAL FINS — two separate squares below body ===
  px(x + 18, y + 23, 6, 5, D);
  px(x + 19, y + 24, 5, 4, B);
  px(x + 27, y + 23, 6, 5, D);
  px(x + 28, y + 24, 5, 4, B);

  // === HEAD — stepped staircase shape (right side) ===
  // Step 1: upper snout block
  px(x + 43, y + 10, 10, 7, B);
  px(x + 47, y + 10,  8, 3, L);    // snout top highlight
  // Step 2: snout extends right, steps down
  px(x + 47, y + 13,  9, 5, B);
  px(x + 52, y + 13,  4, 4, D);    // snout tip dark
  // Step 3: upper jaw / mouth gap
  px(x + 43, y + 17,  8, 4, B);    // upper jaw continues
  px(x + 47, y + 16,  8, 5, '#001133');  // open mouth dark
  // Step 4: lower jaw drops down
  px(x + 43, y + 21, 12, 4, D);
  px(x + 43, y + 21,  9, 3, B);
  // Red tongue mark at jaw tip
  px(x + 51, y + 22,  4, 2, '#cc0000');

  // === EYE — dark square with tiny highlight ===
  px(x + 44, y + 12,  5, 5, D);
  px(x + 45, y + 13,  3, 3, '#111111');
  px(x + 45, y + 13,  1, 1, L);
}

function drawSeaLog(o) {
  // Drifting sea branch — gnarled, angled, with seaweed clinging to it.
  const cx = Math.floor(o.x + o.w / 2);
  const cy = Math.floor(o.y + o.h / 2);

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-0.28); // natural drift angle

  const L = 26; // half-length of branch

  // water shadow
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#000033';
  ctx.fillRect(-L + 2, 4, L * 2 - 4, 4);
  ctx.globalAlpha = 1;

  // main branch — irregular thickness (thicker middle, tapered ends)
  ctx.fillStyle = '#3a2414';
  ctx.fillRect(-L,      -3, L * 2, 6);   // core
  ctx.fillStyle = '#4a3020';
  ctx.fillRect(-L + 3,  -4, L * 2 - 6, 8); // slightly wider mid
  ctx.fillStyle = '#5a3c28';
  ctx.fillRect(-L + 8,  -5, L * 2 - 16, 10); // widest centre

  // tapered broken ends (jagged, not flat)
  ctx.fillStyle = '#3a2414';
  ctx.fillRect(-L - 2,  -2, 5, 4);  // left tip
  ctx.fillStyle = '#2a1810';
  ctx.fillRect(-L - 4,  -1, 3, 2);  // left end broken grain
  ctx.fillRect(L - 1,   -2, 5, 4);  // right tip
  ctx.fillRect(L + 2,   -1, 3, 2);

  // top surface highlight — wet wood sheen
  ctx.fillStyle = '#6a4a30';
  ctx.fillRect(-L + 6,  -4, L * 2 - 14, 2);
  ctx.fillStyle = '#7a5a3a';
  ctx.fillRect(-L + 14, -4, 10, 1);

  // bark cracks / grain
  ctx.fillStyle = '#2a1810';
  ctx.fillRect(-18, -3, 1, 8);
  ctx.fillRect(-4,  -4, 1, 6);
  ctx.fillRect(10,  -3, 1, 7);

  // knobby branch nodes — lumpy bumps where branches broke off
  [- 20, 0, 16].forEach(kx => {
    ctx.fillStyle = '#2a1810';
    ctx.fillRect(kx - 3, -5, 7, 12);
    ctx.fillStyle = '#4a3020';
    ctx.fillRect(kx - 2, -4, 5, 10);
    ctx.fillStyle = '#6a4830';
    ctx.fillRect(kx - 1, -4, 2,  2);  // highlight on knob
  });

  // seaweed clumps — wiggly strands clinging to the branch
  [[-18, -1], [2, 1], [18, -1]].forEach(([wx, dir], i) => {
    const wag = Math.sin(frame * 0.09 + i * 1.8) * 3 * dir;
    const wag2 = Math.sin(frame * 0.07 + i * 2.2 + 1) * 4 * dir;
    // strand 1
    ctx.fillStyle = '#1a6622';
    ctx.fillRect(wx - 1,      -10 + wag,  2, 7,  );
    ctx.fillStyle = '#228833';
    ctx.fillRect(wx - 2,      -6  + wag,  4, 2);
    // strand 2
    ctx.fillStyle = '#156018';
    ctx.fillRect(wx + 2,      -12 + wag2, 2, 9);
    ctx.fillStyle = '#1a7a22';
    ctx.fillRect(wx + 1,      -8  + wag2, 3, 2);
    // trailing below waterline
    ctx.globalAlpha = 0.75;
    ctx.fillStyle = '#1a6622';
    ctx.fillRect(wx,           5  - wag,  2, 8);
    ctx.fillRect(wx + 2,       7  - wag2, 2, 6);
    ctx.globalAlpha = 1;
  });

  ctx.restore();
}

function drawJellyfish(o) {
  const x = Math.floor(o.x), y = Math.floor(o.y);
  const W = o.w, H = o.h;
  const pulse = Math.sin(frame * 0.08 + o.phase) * 2;
  const glow  = Math.abs(Math.sin(frame * 0.06 + o.phase));

  // outer glow
  ctx.globalAlpha = 0.18 * glow;
  px(x - 4,  y - 2,  W + 8,  H + 6, '#ee88ff');
  ctx.globalAlpha = 1;

  // bell dome layers
  px(x + 6,  y,          W - 12, 4 + pulse, '#dd66ff');
  px(x + 2,  y + 3,      W - 4,  5,         '#cc44ff');
  px(x,      y + 7,      W,      7,          '#bb33ee');
  px(x + 2,  y + 13,     W - 4,  3,         '#aa22dd');
  // inner highlight (translucent top)
  ctx.globalAlpha = 0.35;
  px(x + 8,  y + 2,  6,  4,  '#ffffff');
  ctx.globalAlpha = 1;
  // bell rim
  px(x,      y + 15, W,      2,  '#ff88ff');

  // creepy cute face
  // eyes (big and round, blinking slowly)
  const blink = (Math.floor(frame / 90 + o.phase) % 8 === 0);
  if (blink) {
    px(x + 6,  y + 8,  5, 1, '#ffffff'); // blink lines
    px(x + 16, y + 8,  5, 1, '#ffffff');
  } else {
    px(x + 6,  y + 6,  5, 5, '#ffffff'); // left eye
    px(x + 16, y + 6,  5, 5, '#ffffff'); // right eye
    px(x + 7,  y + 7,  3, 3, '#cc00ff'); // left pupil
    px(x + 17, y + 7,  3, 3, '#cc00ff'); // right pupil
    px(x + 8,  y + 7,  1, 1, '#ffffff'); // catchlight
    px(x + 18, y + 7,  1, 1, '#ffffff');
  }
  // tiny smile (unsettling)
  px(x + 10, y + 12, 7,  1,  '#ff88ff');
  px(x + 10, y + 13, 2,  1,  '#ff88ff');
  px(x + 15, y + 13, 2,  1,  '#ff88ff');

  // tentacles — long, wriggly, glowing
  const colors = ['#dd66ff','#ee44ff','#cc88ff','#bb44ee','#ff66ff'];
  for (let i = 0; i < 6; i++) {
    const tx    = x + 2 + i * 5;
    const wag1  = Math.sin(frame * 0.12 + i * 0.9 + o.phase) * 4;
    const wag2  = Math.sin(frame * 0.10 + i * 1.1 + o.phase + 1) * 5;
    const col   = colors[i % colors.length];
    // upper segment
    px(tx + wag1, y + 17, 2, 7,  col);
    // lower segment (extra wiggle)
    px(tx + wag2, y + 24, 2, 10, col);
    // tip glow
    ctx.globalAlpha = 0.5 * glow;
    px(tx + wag2 - 1, y + 34, 4, 3, '#ffffff');
    ctx.globalAlpha = 1;
  }
}

function drawCrowdPerson(cx, py, p, cheering, jumpOff) {
  const jy = cheering ? jumpOff : 0;
  const f  = p.female;

  // shadow
  ctx.globalAlpha = 0.18;
  px(cx - 4, py + 20 - jy + 2, 9, 2, '#000');
  ctx.globalAlpha = 1;

  if (f) {
    // ---- FEMALE ----
    // legs (bare, skin tone)
    px(cx - 4, py + 11 - jy, 3, 9, '#ffcc99');
    px(cx + 1, py + 11 - jy, 3, 9, '#ffcc99');
    // sandals
    px(cx - 5, py + 19 - jy, 5, 2, '#cc8844');
    px(cx + 1, py + 19 - jy, 5, 2, '#cc8844');
    // bikini bottom
    px(cx - 4, py + 9 - jy,  9, 5, p.bot);
    // stomach (bare skin)
    px(cx - 3, py + 4 - jy,  7, 6, '#ffcc99');
    // bikini top (two triangle cups)
    px(cx - 4, py + 1 - jy,  4, 4, p.top);
    px(cx + 1, py + 1 - jy,  4, 4, p.top);
    px(cx - 1, py + 2 - jy,  3, 2, p.top); // centre strap
    // arms
    if (cheering) {
      const wave = Math.sin(frame * 0.25 + cx) * 3;
      px(cx - 8, py - 5 - jy + wave,  4, 3, '#ffcc99');
      px(cx + 5, py - 5 - jy - wave,  4, 3, '#ffcc99');
      px(cx - 9, py - 8 - jy + wave,  3, 3, '#ffcc99');
      px(cx + 6, py - 8 - jy - wave,  3, 3, '#ffcc99');
    } else {
      px(cx - 7, py + 2 - jy, 3, 5, '#ffcc99');
      px(cx + 5, py + 2 - jy, 3, 5, '#ffcc99');
    }
    // head
    px(cx - 3, py - 6 - jy, 7, 7, '#ffcc99');
    // long hair
    px(cx - 4, py - 9 - jy,  9, 4, p.hair);
    px(cx - 5, py - 6 - jy,  3, 9, p.hair); // left drape
    px(cx + 3, py - 6 - jy,  3, 9, p.hair); // right drape
    // ponytail bounce
    const ptail = cheering ? Math.sin(frame * 0.2 + cx) * 3 : 0;
    px(cx + 3, py + 1 - jy + ptail, 2, 6, p.hair);
  } else {
    // ---- MALE ----
    px(cx - 3, py + 12 - jy, 3, 8, '#2255aa');
    px(cx + 1, py + 12 - jy, 3, 8, '#2255aa');
    px(cx - 4, py + 19 - jy, 4, 2, '#222');
    px(cx + 1, py + 19 - jy, 4, 2, '#222');
    px(cx - 4, py + 4 - jy,  9, 9, p.top);
    if (cheering) {
      const wave = Math.sin(frame * 0.25 + cx) * 3;
      px(cx - 8, py - 4 - jy + wave, 4, 3, '#ffcc99');
      px(cx + 5, py - 4 - jy - wave, 4, 3, '#ffcc99');
      px(cx - 9, py - 7 - jy + wave, 3, 3, '#ffcc99');
      px(cx + 6, py - 7 - jy - wave, 3, 3, '#ffcc99');
    } else {
      px(cx - 7, py + 6 - jy, 3, 5, '#ffcc99');
      px(cx + 5, py + 6 - jy, 3, 5, '#ffcc99');
    }
    px(cx - 3, py - 5 - jy, 7, 7, '#ffcc99');
    // hat
    if (p.type === 0) {
      px(cx - 4, py - 8 - jy, 9, 4, p.bot);
      px(cx - 3, py - 10 - jy, 7, 3, p.bot);
    } else if (p.type === 1) {
      px(cx - 4, py - 7 - jy, 9, 3, p.bot);
      px(cx + 2, py - 5 - jy, 5, 2, p.bot);
    } else {
      px(cx - 3, py - 6 - jy, 7, 2, p.bot);
      px(cx - 5, py - 5 - jy, 11, 2, p.bot);
    }
    // short hair
    px(cx - 4, py - 8 - jy, 9, 3, p.hair);
  }

  // face — shared
  px(cx - 2, py - 3 - jy, 1, 1, '#333');
  px(cx + 2, py - 3 - jy, 1, 1, '#333');
  if (cheering) {
    px(cx - 1, py - 1 - jy, 3, 1, '#cc4400');
    px(cx,     py - 1 - jy, 1, 2, '#cc4400');
  } else {
    px(cx - 1, py - 1 - jy, 3, 1, '#885544');
  }
}

function drawBeach() {
  // sand strip
  px(0, BEACH_Y, GW, GH - BEACH_Y, '#c8a850');
  // sand detail rows
  px(0, BEACH_Y,     GW, 3,  '#d4b45a');
  px(0, BEACH_Y + 6, GW, 2,  '#b89840');
  px(0, BEACH_Y + 20, GW, 2, '#b89840');
  px(0, BEACH_Y + 40, GW, 2, '#b89840');
  // wet sand at waterline
  px(0, BEACH_Y - 4, GW, 6, '#7abadd');
  ctx.globalAlpha = 0.4;
  px(0, BEACH_Y - 2, GW, 3, '#aaddff');
  ctx.globalAlpha = 1;

  // palm trees (left and right edges)
  // left palm
  px(4,  BEACH_Y - 40, 4, 40, '#7a5a30'); // trunk
  px(2,  BEACH_Y - 44, 6, 6,  '#5a4020'); // trunk knot
  // fronds
  px(-10, BEACH_Y - 52, 20, 4, '#228822');
  px(-6,  BEACH_Y - 56, 16, 4, '#33aa33');
  px(-2,  BEACH_Y - 60, 10, 4, '#228822');
  px(4,   BEACH_Y - 64, 6,  4, '#33aa33');
  // coconuts
  px(2,  BEACH_Y - 50, 3, 3, '#885500');
  px(6,  BEACH_Y - 48, 3, 3, '#885500');

  // right palm
  px(GW - 8, BEACH_Y - 40, 4, 40, '#7a5a30');
  px(GW - 9, BEACH_Y - 44, 6, 6,  '#5a4020');
  px(GW - 6, BEACH_Y - 52, 20, 4, '#228822');
  px(GW - 8, BEACH_Y - 56, 16, 4, '#33aa33');
  px(GW - 8, BEACH_Y - 60, 10, 4, '#228822');
  px(GW - 10,BEACH_Y - 64, 6,  4, '#33aa33');
  px(GW - 10,BEACH_Y - 50, 3,  3, '#885500');
  px(GW - 6, BEACH_Y - 48, 3,  3, '#885500');

  // draw crowd
  const cheering = cheerFrames > 0;
  crowd.forEach((p, i) => {
    // each person jumps at slightly different times for a wave effect
    const jumpDelay = i * 4;
    const jumpPhase = Math.max(0, cheerFrames - jumpDelay);
    const jumpOff   = cheering && jumpPhase > 0
      ? Math.abs(Math.sin((jumpPhase / 40) * Math.PI)) * 12
      : 0;

    const py = BEACH_Y + p.dy;
    drawCrowdPerson(p.x + 5, py, p, cheering, Math.floor(jumpOff));

    // flag wavers hold a flag
    if (p.flag && cheering) {
      const wx = p.x + 5;
      const wy = py - 14 - Math.floor(jumpOff);
      px(wx + 5, wy - 12, 1, 12, '#888'); // pole
      // flag waves
      const fw = Math.sin(frame * 0.2 + i) * 2;
      px(wx + 6,     wy - 12, 8, 4,      '#ff0000');
      px(wx + 6 + fw, wy - 8, 6, 3,      '#ff0000');
    }
  });

  // score popup floaters
  cheerPopups.forEach(pop => {
    ctx.globalAlpha = pop.life / 80;
    ctx.fillStyle = '#ffff00';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(pop.text, pop.x, pop.y);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  });
}

function drawOcean() {
  const lCfg = LEVELS[level];

  // Sky bands (level-themed)
  const skyBands = lCfg.sky;
  const skyH = GH * 0.26;
  skyBands.forEach((c, i) => {
    px(0, i * (skyH / skyBands.length), GW, skyH / skyBands.length + 1, c);
  });

  // Stars — shown for dark/night levels
  if (lCfg.celestial === 'moon' || lCfg.celestial === 'none') {
    stars.forEach(s => {
      const twinkle = Math.sin(frame * 0.05 + s.twinkle);
      ctx.globalAlpha = 0.5 + twinkle * 0.5;
      px(s.x, s.y, s.r, s.r, '#ffffff');
    });
    ctx.globalAlpha = 1;
  }

  // Celestial body
  if (lCfg.celestial === 'moon') {
    px(GW - 80, 30, 18, 18, '#fffacc');
    px(GW - 78, 28, 14, 14, '#fffacc');
    px(GW - 74, 26, 10, 20, '#fffacc');
    px(GW - 72, 32, 4,  4,  '#eee8aa'); // crater
  } else if (lCfg.celestial === 'sun') {
    px(GW - 50, 12, 22, 22, '#ffee00');
    px(GW - 48, 10, 18, 26, '#ffee00');
    px(GW - 46,  8, 14, 30, '#ffee00');
    ctx.globalAlpha = 0.35;
    px(GW - 60,  6, 42, 5, '#ffffff'); // glare
    px(GW - 56, 11, 4,  14, '#ffffff');
    ctx.globalAlpha = 1;
  } else if (lCfg.celestial === 'sunset') {
    const sy = Math.floor(GH * 0.19);
    px(GW - 48, sy,     18, 18, '#ff6600');
    px(GW - 46, sy - 2, 14, 22, '#ff8800');
    px(GW - 44, sy - 4, 10, 26, '#ffaa00');
    ctx.globalAlpha = 0.22;
    px(GW - 80, sy - 4, 70, 40, '#ff4400'); // glow halo
    ctx.globalAlpha = 1;
  }

  // Horizon glow
  px(0, GH * 0.26 - 3, GW, 3, lCfg.horizon);
  px(0, GH * 0.26,     GW, 2, lCfg.waveCol);

  // Ocean bands (level-themed)
  const oceanColors = lCfg.ocean;
  const oceanY = GH * 0.26;
  const oceanH = GH * 0.74;
  oceanColors.forEach((c, i) => {
    px(0, oceanY + i * (oceanH / oceanColors.length), GW, oceanH / oceanColors.length + 1, c);
  });

  // Scrolling wave lines
  waveLines.forEach(wl => {
    ctx.globalAlpha = 0.35;
    px(wl.x, wl.y, wl.w, 2, lCfg.waveCol);
    ctx.globalAlpha = 0.15;
    px(wl.x + 10, wl.y + 6, wl.w - 18, 1, lCfg.waveCol);
  });

  ctx.globalAlpha = 1;
}

function drawScanlines() {
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#000';
  for (let y = 0; y < GH; y += 3) {
    ctx.fillRect(0, y, GW, 1);
  }
  ctx.globalAlpha = 1;
}

function drawUI() {
  // Score
  ctx.fillStyle = '#00ff44';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE ' + Math.floor(score), 8, 26);
  // Hi score
  ctx.fillStyle = '#ffdd00';
  ctx.font = '13px monospace';
  ctx.fillText('BEST  ' + Math.floor(hiScore), 8, 44);
  // Gnarly meter
  const gnarly = Math.min((speed - 2) / 9, 1);
  const barW = 80;
  const bx = GW - barW - 8;
  ctx.fillStyle = '#222';
  ctx.fillRect(bx, 10, barW, 10);
  ctx.fillStyle = gnarly > 0.7 ? '#ff2200' : gnarly > 0.4 ? '#ff8800' : '#00ff44';
  ctx.fillRect(bx, 10, Math.floor(barW * gnarly), 10);
  ctx.fillStyle = '#00ff44';
  ctx.fillRect(bx - 1,    9,  barW + 2, 1);
  ctx.fillRect(bx - 1,   20, barW + 2, 1);
  ctx.fillRect(bx - 1,   10, 1, 10);
  ctx.fillRect(bx + barW, 10, 1, 10);
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('GNARLY', GW - 8, 34);

  // Level indicator (centered top)
  const lCfg = LEVELS[level];
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('LVL ' + lCfg.num + '  ' + lCfg.name, GW / 2, 18);
  // Level progress bar
  const lvlProg = Math.min(levelTimer / lCfg.duration, 1);
  const lpW = 110;
  const lpX = Math.floor((GW - lpW) / 2);
  ctx.fillStyle = '#333';
  ctx.fillRect(lpX, 22, lpW, 4);
  ctx.fillStyle = '#ff6600';
  ctx.fillRect(lpX, 22, Math.floor(lpW * lvlProg), 4);
  // bar border
  ctx.fillStyle = '#555';
  ctx.fillRect(lpX - 1, 21, lpW + 2, 1);
  ctx.fillRect(lpX - 1, 26, lpW + 2, 1);

  ctx.textAlign = 'left';
}

function drawLeaderboard(centerX, startY) {
  const lb = lbCache;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd00';
  ctx.font = "8px 'Press Start 2P', monospace";
  ctx.fillText('TOP SCORES', centerX, startY);
  if (lb.length === 0) {
    ctx.fillStyle = '#555';
    ctx.font = "7px 'Press Start 2P', monospace";
    ctx.fillText('NO SCORES YET', centerX, startY + 18);
    return;
  }
  const medals = ['#ffd700','#cccccc','#cd7f32','#88aaff','#88aaff'];
  lb.forEach((e, i) => {
    ctx.fillStyle = medals[i];
    ctx.font = "7px 'Press Start 2P', monospace";
    const rank = ['1ST','2ND','3RD','4TH','5TH'][i];
    // draw rank left, name center-left, score right
    ctx.textAlign = 'left';
    ctx.fillText(rank, centerX - 90, startY + 18 + i * 17);
    ctx.textAlign = 'center';
    ctx.fillText(e.name, centerX, startY + 18 + i * 17);
    ctx.textAlign = 'right';
    ctx.fillText(e.score, centerX + 90, startY + 18 + i * 17);
  });
  ctx.textAlign = 'left';
}

function drawNameEntry() {
  ctx.fillStyle = 'rgba(0,0,0,0.84)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd00';
  ctx.font = "bold 14px 'Press Start 2P', monospace";
  ctx.fillText('NEW HIGH SCORE!', GW/2, GH/2 - 80);
  ctx.fillStyle = '#ffffff';
  ctx.font = "10px 'Press Start 2P', monospace";
  ctx.fillText('SCORE: ' + Math.floor(score), GW/2, GH/2 - 44);
  ctx.fillStyle = '#00ff44';
  ctx.font = "8px 'Press Start 2P', monospace";

  ctx.fillText('THEN PRESS ENTER', GW/2, GH/2 + 70);

}

function drawLevelBanner() {
  if (levelBannerTimer <= 0) return;
  const lCfg = LEVELS[level];
  // Fade in first 20 frames, hold, fade out last 30 frames
  let a = 1;
  if (levelBannerTimer > 130) a = (150 - levelBannerTimer) / 20;
  else if (levelBannerTimer < 30) a = levelBannerTimer / 30;
  ctx.globalAlpha = Math.max(0, Math.min(1, a));

  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, GH / 2 - 52, GW, 96);
  // top/bottom border lines
  ctx.fillStyle = '#ff6600';
  ctx.fillRect(0, GH / 2 - 53, GW, 2);
  ctx.fillRect(0, GH / 2 + 44, GW, 2);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff6600';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('LEVEL ' + lCfg.num, GW / 2, GH / 2 - 22);
  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 28px monospace';
  ctx.fillText(lCfg.name, GW / 2, GH / 2 + 10);
  ctx.fillStyle = '#00ff44';
  ctx.font = '12px monospace';
  ctx.fillText('SURVIVE THE WAVE!', GW / 2, GH / 2 + 34);
  ctx.textAlign = 'left';
  ctx.globalAlpha = 1;
}

function drawWin() {
  ctx.fillStyle = 'rgba(0,0,0,0.88)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  // Rainbow shimmer on title
  const hue = (frame * 3) % 360;
  ctx.fillStyle = `hsl(${hue},100%,60%)`;
  ctx.font = 'bold 48px monospace';
  ctx.fillText('YOU WIN!', GW / 2, GH / 2 - 130);

  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('ALL 5 LEVELS CONQUERED!', GW / 2, GH / 2 - 78);

  ctx.fillStyle = '#aaaaaa';
  ctx.font = '13px monospace';
  ctx.fillText('TOTALLY GNARLY PERFORMANCE', GW / 2, GH / 2 - 52);

  ctx.fillStyle = '#ffffff';
  ctx.font = '20px monospace';
  ctx.fillText('SCORE: ' + Math.floor(score), GW / 2, GH / 2 - 10);

  ctx.fillStyle = '#ffdd00';
  ctx.font = '16px monospace';
  ctx.fillText('BEST:  ' + Math.floor(hiScore), GW / 2, GH / 2 + 18);

  // Bouncing surfer
  const bob = Math.sin(frame * 0.09) * 5;
  drawSurfer(GW / 2, GH / 2 + 100 + bob, false);

  if (Math.floor(frame / 28) % 2 === 0) {
    ctx.fillStyle = '#ff6600';

    ctx.fillText('>> TAP TO PLAY AGAIN <<', GW / 2, GH / 2 + 178);

}

function drawTitle() {
  drawOcean();
  const bob = Math.sin(frame * 0.05) * 4;
  drawSurfer(GW / 2, GH * 0.28 + bob, false);
  drawScanlines();

  const panelY = GH * 0.35;

  // Title panel
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(18, panelY, GW - 36, 268);
  ctx.strokeStyle = '#00ff44';
  ctx.lineWidth = 2;
  ctx.strokeRect(18, panelY, GW - 36, 268);
  ctx.strokeStyle = '#ff6600';
  ctx.lineWidth = 1;
  ctx.strokeRect(22, panelY + 4, GW - 44, 260);

  ctx.textAlign = 'center';

  // Helper: draw text with 3D pixel-extrusion shadow
  function draw3D(text, cx, cy, size, colorTop, colorBot, shadowCol) {
    const off = Math.max(3, Math.floor(size / 9));
    ctx.font = `${size}px 'Press Start 2P', monospace`;
    // shadow layer (offset down-right)
    ctx.fillStyle = shadowCol;
    ctx.fillText(text, cx + off, cy + off);
    // highlight layer (offset up-left, subtle)
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillText(text, cx - 1, cy - 1);
    // main text with vertical gradient
    const grad = ctx.createLinearGradient(0, cy - size, 0, cy + 4);
    grad.addColorStop(0, colorTop);
    grad.addColorStop(1, colorBot);
    ctx.fillStyle = grad;
    ctx.fillText(text, cx, cy);
  }

  // RADICAL
  draw3D('RADICAL',   GW / 2, panelY + 66,  30, '#ffee00', '#ff8800', '#7a1100');
  // SURFRIDER
  draw3D('SURFRIDER', GW / 2, panelY + 114, 26, '#ff9900', '#ff2200', '#550000');

  // Subtitle
  ctx.fillStyle = '#00ff44';
  ctx.font = "9px 'Press Start 2P', monospace";
  ctx.fillText('~ AN 8-BIT SURF ODYSSEY ~', GW / 2, panelY + 142);

  // Instructions
  ctx.fillStyle = '#999999';
  ctx.font = "8px 'Press Start 2P', monospace";
  ctx.fillText('DRAG LEFT OR RIGHT', GW / 2, panelY + 180);
  ctx.fillText('TO DODGE OBSTACLES', GW / 2, panelY + 202);

  // Blinking start prompt
  if (Math.floor(frame / 28) % 2 === 0) {
    ctx.fillStyle = '#ff6600';
    ctx.font = "10px 'Press Start 2P', monospace";
    ctx.fillText('>> TAP TO START <<', GW / 2, panelY + 248);
  }

  // Photosensitivity warning below panel
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = "6px 'Press Start 2P', monospace";
  ctx.fillText('PHOTOSENSITIVITY WARNING: contains flashing lights', GW / 2, panelY + 280);

  // Leaderboard below warning
  ctx.globalAlpha = 0.85;
  drawLeaderboard(GW / 2, panelY + 298);
  ctx.globalAlpha = 1;

  ctx.textAlign = 'left';
}

function drawDead() {
  ctx.fillStyle = 'rgba(0,0,0,0.84)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff0000';
  ctx.font = "bold 32px 'Press Start 2P', monospace";
  ctx.fillText('WIPEOUT!', GW/2, 80);

  ctx.fillStyle = '#ffffff';
  ctx.font = "10px 'Press Start 2P', monospace";
  ctx.fillText('SCORE: ' + Math.floor(score), GW/2, 118);

  ctx.fillStyle = '#ffdd00';
  ctx.font = "8px 'Press Start 2P', monospace";
  ctx.fillText('BEST: ' + Math.floor(hiScore), GW/2, 140);

  let rating = 'BOGUS, DUDE!';
  if (score > 600) rating = 'TOTALLY GNARLY!!';
  else if (score > 300) rating = 'RADICAL, DUDE!';
  else if (score > 120) rating = 'NOT BAD, BRO!';
  else if (score > 50)  rating = 'KEEP SURFING!';
  ctx.fillStyle = '#00ff44';
  ctx.font = "9px 'Press Start 2P', monospace";
  ctx.fillText(rating, GW/2, 168);

  // divider
  ctx.fillStyle = '#333';
  ctx.fillRect(30, 182, GW - 60, 1);

  if (Math.floor(frame / 28) % 2 === 0) {
    ctx.fillStyle = '#ff6600';
    ctx.font = "8px 'Press Start 2P', monospace";
    ctx.textAlign = 'center';
    ctx.fillText('TAP TO SURF AGAIN', GW/2, 390);
  }
  ctx.textAlign = 'left';
}

// ---- SPAWN ----
function spawnFormationObstacle(xFrac, type) {
  const sizes = { shark: [56, 32], sealog: [52, 28], jellyfish: [30, 26] };
  const [w, h] = sizes[type] || [32, 28];
  const x = Math.max(8, Math.min(GW - w - 8, Math.floor(xFrac * (GW - w))));
  obstacles.push({ x, y: -h - 20, w, h, type, spd: 0.8 + Math.random() * 0.5, phase: Math.random() * Math.PI * 2 });
}

function spawnObstacle() {
  if (Math.random() < 0.15) { spawnBonusWave(); return; }
  const roll = Math.random();
  let type, w, h;
  if (roll < 0.45) { type = 'shark'; w = 56; h = 32; }
  else if (roll < 0.75) { type = 'sealog'; w = 52; h = 28; }
  else { type = 'jellyfish'; w = 30; h = 26; }

  obstacles.push({
    x: 16 + Math.random() * (GW - 32 - w),
    y: -h - 20,
    w, h, type,
    spd: 0.9 + Math.random() * 0.8,
    phase: Math.random() * Math.PI * 2
  });
}

function spawnParticles(x, y) {
  for (let i = 0; i < 24; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = 1.5 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 2,
      life: 50 + Math.random() * 30,
      maxLife: 80,
      color: ['#ff6600','#ffdd00','#00aaff','#ffffff','#ff2200'][Math.floor(Math.random() * 5)],
      size: 2 + Math.random() * 5
    });
  }
}

function spawnBonusWave() {
  const w = 64, h = 40;
  bonusWaves.push({
    x: 16 + Math.random() * (GW - 32 - w),
    y: -h - 20, w, h,
    spd: 0.7 + Math.random() * 0.4,
    phase: Math.random() * Math.PI * 2
  });
}

function drawBonusWave(o) {
  const x = Math.floor(o.x);
  const y = Math.floor(o.y);
  const foam = Math.sin(frame * 0.18 + o.phase) > 0 ? '#ffffff' : '#ddf4ff';
  // Wave body — rolling curl shape
  const body = [
    [0,20,64,20,'#0077cc'],
    [4,14,56,8, '#0099ee'],
    [8,8, 48,8, '#22aaff'],
    [12,4,36,6, '#55ccff'],
    // curl lip
    [10,2,18,4, '#88ddff'],
    [28,0,14,4, '#aaeeff'],
    // foam top
    [8,0, 10,3, foam],
    [22,0,8, 2, foam],
    [34,0,10,3, foam],
    // white water base
    [0,36,16,4, '#aaddff'],
    [20,34,10,4,'#aaddff'],
    [36,36,14,4,'#aaddff'],
  ];
  body.forEach(([rx,ry,rw,rh,c]) => px(x+rx, y+ry, rw, rh, c));
  // Bonus star indicator above wave
  ctx.fillStyle = '#ffff00';
  ctx.font = '8px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('+100', x + 32, y - 4);
}

// ---- COLLISION ----
function collides(surfer, obs) {
  const margin = 6;
  return (
    surfer.x - surfer.w / 2 + margin < obs.x + obs.w - margin &&
    surfer.x + surfer.w / 2 - margin > obs.x + margin &&
    surfer.y - surfer.h / 2 + margin < obs.y + obs.h - margin &&
    surfer.y + surfer.h / 2 - margin > obs.y + margin
  );
}

// ---- UPDATE ----
function update(dt) {
  frame += dt;

  if (state !== 'playing') return;

  const lCfg = LEVELS[level];

  // ---- LEVEL TIMER & PROGRESSION ----
  levelTimer += dt;
  if (levelBannerTimer > 0) levelBannerTimer -= dt;

  // Speed from level config, ramping across level duration
  const lvlProg = Math.min(levelTimer / lCfg.duration, 1);
  speed = lCfg.baseSpeed + (lCfg.maxSpeed - lCfg.baseSpeed) * lvlProg;
  // In endless mode, never drop below the floor (gets harder each cycle)
  if (endless) speed = Math.max(minSpeed + cycle * 0.8, speed);

  // Advance level
  if (levelTimer >= lCfg.duration) {
    if (level < LEVELS.length - 1) {
      level++;
      levelTimer = 0;
      formationTimer = 0;
      pendingSpawns = [];
      if (!endless) { levelBannerTimer = 150; sfxLevelUp(); }
    } else {
      // Completed all 5 levels — go endless, cycle back to level 1 visuals
      if (!endless) { endless = true; minSpeed = speed; }
      cycle++;
      level = 0;
      levelTimer = 0;
      formationTimer = 0;
      pendingSpawns = [];
      // no banner
    }
  }

  // ---- LIGHTNING (storm levels) ----
  if (lCfg.lightning) {
    lightningTimer += dt;
    if (lightningTimer > 180 + Math.floor(Math.random() * 360)) {
      lightningTimer = 0;
      lightningFlash = 8;
    }
    if (lightningFlash > 0) lightningFlash -= dt;
  } else {
    lightningFlash = 0;
  }

  // ---- WAVE LINES ----
  waveLines.forEach(wl => {
    wl.y += wl.spd * (speed * 0.45) * dt;
    if (wl.y > GH) {
      wl.y = -8;
      wl.x = Math.random() * GW;
      wl.w = 20 + Math.random() * 55;
    }
  });

  // ---- SURFER MOVEMENT ----
  if (touching && touchX !== null) surfer.targetX = touchX;
  if (keys['ArrowLeft']  || keys['a']) surfer.targetX -= 9;
  if (keys['ArrowRight'] || keys['d']) surfer.targetX += 9;
  surfer.targetX = Math.max(surfer.w / 2 + 4, Math.min(GW - surfer.w / 2 - 4, surfer.targetX));
  surfer.x += (surfer.targetX - surfer.x) * 0.14 * dt;

  // ---- SCORE & CHEERS ----
  score += speed * 0.12 * dt;
  if (score > hiScore) hiScore = score;
  // Score popup every 50 points
  const popMilestone = Math.floor(score / 50);
  if (popMilestone > lastCheerMilestone) {
    lastCheerMilestone = popMilestone;
    cheerPopups.push({ x: GW / 2, y: BEACH_Y - 10, text: popMilestone * 50 + '!!', life: 80 });
  }
  // Crowd cheer — interval scales with speed so cadence stays constant
  const cheerInterval = Math.round(200 * speed / 2);
  const bigCheer = Math.floor(score / cheerInterval);
  if (bigCheer > lastBigCheer) {
    lastBigCheer = bigCheer;
    cheerFrames = 120;
    sfxCheer();
  }
  if (cheerFrames > 0) cheerFrames--;
  cheerPopups = cheerPopups.filter(p => { p.y -= 0.8 * dt; p.life -= dt; return p.life > 0; });

  // ---- FORMATION SPAWNING ----
  formationTimer += dt;
  if (formationTimer >= lCfg.formInterval) {
    formationTimer = 0;
    const pat = lCfg.patterns[Math.floor(Math.random() * lCfg.patterns.length)];
    pat.forEach(obs => pendingSpawns.push({ x: obs.x, type: obs.t, spawnAt: frame + obs.d }));
  }
  pendingSpawns = pendingSpawns.filter(ps => {
    if (frame >= ps.spawnAt) { spawnFormationObstacle(ps.x, ps.type); return false; }
    return true;
  });

  // Occasional random fill between formations
  spawnTimer += dt;
  const randInterval = Math.max(90, lCfg.formInterval * 0.7);
  if (spawnTimer >= randInterval) {
    spawnTimer = 0;
    spawnObstacle();
  }

  // ---- OBSTACLES ----
  obstacles = obstacles.filter(obs => {
    obs.y += obs.spd * speed * 0.55 * dt;
    if (collides(surfer, obs)) {
      spawnParticles(surfer.x, surfer.y);
      shakeFrames = 18;
      frame = 0;
      sfxWipeout();
      stopBGM();
      if (paddleGainNode && audioCtx) paddleGainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
      if (score > 0 && qualifies(score)) {
        state = 'nameentry';
        positionNameInput();
        nameWrap.style.display = 'flex';
        nameInput.value = '';
        setTimeout(() => nameInput.focus(), 80);
      } else {
        state = 'dead';
      }
    }
    return obs.y + obs.h < BEACH_Y - 30;
  });

  // ---- BONUS WAVES ----
  bonusWaves = bonusWaves.filter(w => {
    w.y += w.spd * speed * 0.55 * dt;
    if (collides(surfer, w)) {
      score += 100;
      spinFrames = 50;
      cheerFrames = 80;
      sfxCheer();
      return false;
    }
    return w.y + w.h < BEACH_Y - 30;
  });
  if (spinFrames > 0) spinFrames -= dt;

  // ---- PARTICLES ----
  particles = particles.filter(p => {
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;
    p.vy += 0.18 * dt;
    p.vx *= Math.pow(0.96, dt);
    p.life -= dt;
    return p.life > 0;
  });

  if (shakeFrames > 0) shakeFrames -= dt;

  // ---- AUDIO TRIGGERS ----
  // Woahh — fires once when surfer first gets scared, 3-sec cooldown
  const nowScared = obstacles.some(o => {
    const dx = Math.abs(surfer.x - (o.x + o.w / 2));
    const dy = (o.y + o.h) - surfer.y;
    return dx < 60 && dy > -20 && dy < 80;
  });
  if (nowScared && !wasScared && woahCooldown <= 0) { sfxWoahh(); woahCooldown = 200; }
  wasScared = nowScared;
  if (woahCooldown > 0) woahCooldown -= dt;

  // Shark proximity pulse
  const sharkClose = obstacles.some(o => {
    if (o.type !== 'shark') return false;
    const dx = Math.abs(surfer.x - (o.x + o.w / 2));
    const dy = (o.y + o.h) - surfer.y;
    return dx < 110 && dy > -30 && dy < 160;
  });
  if (sharkClose && sharkPulseCooldown <= 0) { sfxSharkPulse(); sharkPulseCooldown = 65; }
  if (sharkPulseCooldown > 0) sharkPulseCooldown -= dt;

  // Paddle whoosh — swells when moving, fades when still
  if (paddleGainNode && audioCtx) {
    const moving = Math.abs(surfer.targetX - surfer.x) > 6;
    paddleGainNode.gain.setTargetAtTime(moving ? 0.10 : 0, audioCtx.currentTime, 0.08);
  }
}

// ---- DRAW ----
function draw() {
  ctx.clearRect(0, 0, GW, GH);

  // Screen shake on death
  if (shakeFrames > 0) {
    ctx.save();
    ctx.translate(
      (Math.random() - 0.5) * 8,
      (Math.random() - 0.5) * 8
    );
  }

  if (state === 'title') {
    drawTitle();
    if (shakeFrames > 0) ctx.restore();
    return;
  }

  if (state === 'nameentry') {
    drawOcean();
    drawBeach();
    drawScanlines();
    drawNameEntry();
    if (shakeFrames > 0) ctx.restore();
    return;
  }

  drawOcean();
  drawBeach();

  // Obstacles
  obstacles.forEach(obs => {
    if (obs.type === 'shark')     drawShark(obs);
    else if (obs.type === 'sealog') drawSeaLog(obs);
    else                          drawJellyfish(obs);
  });

  // Bonus waves
  bonusWaves.forEach(w => drawBonusWave(w));

  // Surfer (with bob) — scared face when obstacle nearby, spin on wave hit
  const bob = state === 'playing' ? Math.sin(frame * 0.09) * 3 : 0;
  const scared = spinFrames <= 0 && obstacles.some(o => {
    const dx = Math.abs(surfer.x - (o.x + o.w / 2));
    const dy = (o.y + o.h) - surfer.y;
    return dx < 60 && dy > -20 && dy < 80;
  });
  if (spinFrames > 0) {
    const spinAngle = ((50 - spinFrames) / 50) * Math.PI * 2;
    ctx.save();
    ctx.translate(surfer.x, surfer.y + bob);
    ctx.rotate(spinAngle);
    drawSurfer(0, 0, false);
    ctx.restore();
  } else {
    drawSurfer(surfer.x, surfer.y + bob, scared);
  }

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    px(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size, p.color);
  });
  ctx.globalAlpha = 1;

  drawScanlines();
  drawUI();

  if (state === 'dead') drawDead(); // shakes with everything else

  if (shakeFrames > 0) ctx.restore(); // restore shake here

  if (state === 'dead') drawLeaderboard(GW/2, 200); // stable — drawn after shake restored

  // Lightning flash overlay
  if (lightningFlash > 0) {
    ctx.globalAlpha = (lightningFlash / 8) * 0.55;
    ctx.fillStyle = '#aaccff';
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
  }

  // Level transition banner (on top of everything)
  if (state === 'playing') drawLevelBanner();
}

let lastTimestamp = 0;
function loop(timestamp) {
  const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / (1000 / 60), 3) : 1;
  lastTimestamp = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
